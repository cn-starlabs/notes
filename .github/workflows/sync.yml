name: Sync to Notes2
on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false 

      # Remove files that should NOT exist in Notes2
      - name: Clean sensitive files
        run: |
          rm -f CNAME
          rm -rf .github/workflows
          
      - name: Push to Notes2
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.SYNC_TOKEN }}
          repository: cn-starlabs/notes2
          branch: main
          force: true
